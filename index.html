<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose St. Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <div class="logo">
                <span class="dot"></span>
                <h1>Rose St. Dashboard</h1>
            </div>
            <div class="location-tag">Doña Marciana, Valenzuela City</div>
        </header>

        <div id="main-layout">
            <aside id="info-panel">
                <div class="panel-header">
                    <h3>Area Intelligence</h3>
                    <p>M2RC+CJ5, Brgy. Ugong</p>
                </div>
                
                <div id="ajax-content">
                    <div class="loading-text">Syncing...</div>
                </div>

                <button id="refresh-btn">Update Records</button>
            </aside>

            <main id="app-container">
                <div class="canvas-wrapper">
                    <div class="label">Local Map</div>
                    <div id="map-canvas"></div>
                </div>
                
                <div class="canvas-wrapper">
                    <div class="label">Neighborhood View</div>
                    <div id="photo-canvas">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!4v1715600000000!6m8!1m2!1s-uR-pU9iS3Xp_n-5-z-Z2g!2m2!1d14.69585!2d121.00685!3f235!4f10!5f0.7820865974627469" 
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                        </iframe>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
